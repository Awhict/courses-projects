<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流量检测</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            secondary: '#36CFC9',
            success: '#52C41A',
            danger: '#FF4D4F',
            dark: '#1D2129',
            light: '#F2F3F5'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-50 text-gray-800">
  <!-- 导航栏 -->
  <nav class="fixed w-full z-50 bg-white shadow-sm">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="index.html" class="flex-shrink-0 flex items-center">
            <i class="fa fa-shield text-primary text-2xl mr-2"></i>
            <span class="text-xl font-bold text-primary">基于Transformer的加密流量检测系统</span>
          </a>
          <div class="hidden md:ml-10 md:flex md:space-x-8">
            <a href="index.html" class="text-gray-600 hover:text-primary px-3 py-2 text-sm font-medium">首页</a>
            <a href="model.html" class="text-gray-600 hover:text-primary px-3 py-2 text-sm font-medium">模型架构</a>
            <a href="detection.html" class="text-primary px-3 py-2 text-sm font-medium border-b-2 border-primary">流量检测</a>
            <a href="visualization.html" class="text-gray-600 hover:text-primary px-3 py-2 text-sm font-medium">数据可视化</a>
            <a href="results.html" class="text-gray-600 hover:text-primary px-3 py-2 text-sm font-medium">实验结果</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- 页面头部 -->
  <div class="pt-24 pb-12 bg-white">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
      <div class="max-w-3xl mx-auto text-center">
        <h1 class="text-4xl font-bold text-gray-900 mb-4">流量检测</h1>
        <p class="text-lg text-gray-600">点击开始检测，系统将自动分析流量数据并展示检测结果</p>
      </div>
    </div>
  </div>

  <!-- 检测内容 -->
  <div class="py-12">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
      <div class="max-w-2xl mx-auto">
        <!-- 检测控制面板 -->
        <div class="bg-white rounded-xl shadow-sm p-8 text-center">
          <div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fa fa-shield text-primary text-3xl"></i>
          </div>
          
          <h2 class="text-2xl font-bold text-gray-900 mb-4">开始流量检测</h2>
          <p class="text-gray-600 mb-8">系统将使用训练好的Transformer模型对网络流量进行分析，检测潜在的恶意行为</p>
          
          <button id="startDetection" class="bg-primary hover:bg-primary/90 text-white px-8 py-4 rounded-lg font-semibold text-lg transition-all duration-300 transform hover:scale-105">
            <i class="fa fa-play-circle mr-2"></i> 开始检测
          </button>
          
          <div id="loadingIndicator" class="mt-6 hidden">
            <div class="flex items-center justify-center space-x-3">
              <div class="w-6 h-6 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
              <span class="text-gray-600">正在分析流量数据...</span>
            </div>
          </div>
          
          <div id="resultSummary" class="mt-8 hidden">
            <div class="bg-green-50 border border-green-200 rounded-lg p-6">
              <div class="flex items-center justify-center mb-4">
                <i class="fa fa-check-circle text-green-500 text-2xl mr-2"></i>
                <span class="text-lg font-semibold text-green-800">检测完成</span>
              </div>
              <p class="text-green-700 mb-4">流量分析已完成，正在跳转到可视化页面...</p>
              <div class="w-full bg-green-200 rounded-full h-2">
                <div id="progressBar" class="bg-green-500 h-2 rounded-full transition-all duration-1000" style="width: 0%"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- 快速统计 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
          <div class="bg-white rounded-lg p-4 text-center shadow-sm">
            <div class="text-2xl font-bold text-primary mb-1" id="totalFlows">0</div>
            <div class="text-sm text-gray-600">分析流量数</div>
          </div>
          <div class="bg-white rounded-lg p-4 text-center shadow-sm">
            <div class="text-2xl font-bold text-success mb-1" id="normalFlows">0</div>
            <div class="text-sm text-gray-600">正常流量</div>
          </div>
          <div class="bg-white rounded-lg p-4 text-center shadow-sm">
            <div class="text-2xl font-bold text-danger mb-1" id="maliciousFlows">0</div>
            <div class="text-sm text-gray-600">恶意流量</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="bg-gray-900 text-white py-12">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
      <div class="text-center text-gray-500 text-sm">
        <p>&copy; 2025 北京邮电大学 网络空间安全学院 信息安全工程实践课程项目 保留所有权利</p>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('startDetection').addEventListener('click', function() {
      const button = this;
      const loadingIndicator = document.getElementById('loadingIndicator');
      const resultSummary = document.getElementById('resultSummary');
      const progressBar = document.getElementById('progressBar');
      
      // 显示加载状态
      button.disabled = true;
      loadingIndicator.classList.remove('hidden');
      
      // 模拟检测过程
      setTimeout(() => {
        loadingIndicator.classList.add('hidden');
        resultSummary.classList.remove('hidden');
        
        // 更新统计数据
        document.getElementById('totalFlows').textContent = '1,247';
        document.getElementById('normalFlows').textContent = '1,189';
        document.getElementById('maliciousFlows').textContent = '58';
        
        // 进度条动画
        let progress = 0;
        const progressInterval = setInterval(() => {
          progress += 2;
          progressBar.style.width = progress + '%';
          
          if (progress >= 100) {
            clearInterval(progressInterval);
            // 跳转到可视化页面
            setTimeout(() => {
              window.location.href = 'visualization.html';
            }, 500);
          }
        }, 50);
      }, 2000);
    });
  </script>
</body>
</html>
